<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOADOUT – CSFLOAT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      background: #1a1d29;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 40px 60px;
    }

    /* ── HEADER BAR ───────────────────────────── */
    .header-bar {
      background: #161922;
      border-radius: 12px;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 40px;
      max-width: 600px;
    }

    .back-arrow {
      font-size: 1.4rem;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .back-arrow:hover { opacity: 1; color: white; }

    .arrow-line {
      width: 40px;
      height: 2px;
      background: white;
      display: inline-block;
      margin-right: 4px;
      position: relative;
      top: -1px;
    }

    .header-bar h1 {
      font-style: italic;
      font-weight: bold;
      font-size: 2.4rem;
      margin: 0;
      letter-spacing: 2px;
    }

    /* ── LOADOUT GRID ─────────────────────────── */
    .loadout-panel {
      background: #20243a;
      border-radius: 12px;
      padding: 40px 40px 50px;
    }

    .loadout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px 60px;
    }

    .skin-slot {
      border: 1px solid #2e334d;
      border-radius: 10px;
      padding: 22px 26px;
      background: #161922;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .skin-slot:hover {
      border-color: #555a7a;
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.4);
    }

    .skin-slot .category {
      font-style: italic;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aab0cc;
      margin-bottom: 6px;
    }

    .skin-slot .skin-name {
      font-style: italic;
      font-weight: 700;
      font-size: 1.15rem;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .skin-slot .skin-name .star {
      color: #e0c060;
      margin-right: 4px;
    }

    /* ── BOTTOM BACK BUTTON ───────────────────── */
    .back-btn {
      background: #161922;
      color: white;
      border: 2px solid #555;
      padding: 14px 50px;
      font-size: 1.1rem;
      width: 280px;
      margin-top: 40px;
      display: block;
      text-align: center;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #252a3d;
      border-color: #777;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      color: white;
    }

    @media (max-width: 640px) {
      body { padding: 20px; }
      .loadout-grid { grid-template-columns: 1fr; gap: 20px; }
      .header-bar h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header-bar">
    <a href="index.html" class="back-arrow">
      <span class="arrow-line"></span>←
    </a>
    <h1>LOADOUT</h1>
  </div>

  <!-- Skin slots -->
  <div class="loadout-panel">
    <div class="loadout-grid">

      <div class="skin-slot">
        <div class="category">Skin za automatsku pušku</div>
        <div class="skin-name">"AK-47 | Case Hardened"</div>
      </div>

      <div class="skin-slot">
        <div class="category">Skin za pištolj</div>
        <div class="skin-name">"USP | PrintStream"</div>
      </div>

      <div class="skin-slot">
        <div class="category">Skin za snajper</div>
        <div class="skin-name">"AWP | Dragon Lore"</div>
      </div>

      <div class="skin-slot">
        <div class="category">Skin za nož</div>
        <div class="skin-name"><span class="star">★</span>Karambit Vanilla</div>
      </div>

    </div>
  </div>

  <!-- Back button -->
  <a href="index.html" class="back-btn mx-auto">← NAZAD</a>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
