<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            font-size: 18px;
        }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back-link:hover {
            color: #aaa;
        }
        h1 {
            font-style: italic;
            margin-bottom: 30px;
        }
        .weapon-card {
            background: #161922;
            padding: 25px;
            margin: 15px 0;
            border-radius: 10px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .weapon-card:hover {
            background: #252a3d;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← LOADOUT</a>
    <h1>Loadout</h1>
    
    <div class="weapon-card">AK-47 | Case Hardened</div>
    <div class="weapon-card">AWP | Dragon Lore</div>
    <div class="weapon-card">USP | Printstream</div>
    <div class="weapon-card">★ Karambit Vanilla</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
