<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            font-size: 16px;
        }
        h1 {
            font-style: italic;
            margin-bottom: 30px;
        }
        .carousel {
            max-width: 700px;
            margin: 0 auto;
        }
        .carousel-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            background: #2d3748;
        }
        .carousel-caption {
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 10px 20px;
            bottom: 20px;
        }
        .carousel-caption h5 {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .carousel-caption p {
            color: #4ade80;
            font-size: 1.1rem;
            margin: 0;
        }
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            filter: invert(1);
        }
        .carousel-indicators [data-bs-target] {
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn btn-outline-light btn-sm mt-3 mb-4">← KATALOG</a>
    <h1>Katalog</h1>

    <div id="katalogCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="3"></button>

            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="7"></button>
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="8"></button>
            <button type="button" data-bs-target="#katalogCarousel" data-bs-slide-to="9"></button>
        </div>
