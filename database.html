<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            font-size: 18px;
        }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back-link:hover {
            color: #aaa;
        }
        h1 {
            font-style: italic;
            margin-bottom: 30px;
        }
        .item-card {
            background: #161922;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .item-card:hover {
            background: #252a3d;
            transform: translateX(5px);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← DATABASE</a>
    <h1>Database</h1>
    
    <div class="item-card">
        <span>#1 ★ Karambit Vanilla</span>
        <span class="text-muted">| Float 0</span>
    </div>
    <div class="item-card">
        <span>#2 MAC-10 Bronzer</span>
        <span class="text-muted">| Float 0.001</span>
    </div>
    <div class="item-card">
        <span>#3 AUG Eye of Zape</span>
        <span class="text-muted">| Float 0.002</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
