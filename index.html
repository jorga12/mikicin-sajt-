<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSFLOAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: #2d3748;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-style: italic;
            font-weight: bold;
            margin-bottom: 30px;
        }
        h1 {
            font-style: italic;
            margin-bottom: 40px;
            font-size: 3rem;
        }
        .btn-custom {
            background: #161922;
            color: white;
            border: 2px solid #555;
            padding: 15px 50px;
            font-size: 1.2rem;
            width: 280px;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background: #252a3d;
            border-color: #777;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="text-center">
    <div class="logo mx-auto">f</div>
    <h1>CSFLOAT</h1>
    
    <a href="market.html" class="btn btn-custom d-block">MARKET</a>
