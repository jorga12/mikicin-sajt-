<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            font-size: 16px;
        }
        .back-link {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back-link:hover {
            color: #aaa;
        }
        h1 {
            font-style: italic;
            margin-bottom: 30px;
        }
        .market-item {
            background: #161922;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }
        .market-item:hover {
            background: #252a3d;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .market-item img {
            width: 100px;
            height: 100px;
            background: #444;
            border-radius: 10px;
            object-fit: cover;
        }
        .item-details {
            flex: 1;
        }
        .item-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .item-price {
            color: #4ade80;
            font-size: 1.2rem;
            font-weight: 600;
        }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← MARKET</a>
    <h1>Market</h1>
    
    <div class="market-item">
        <img src="kalas1.jfif" alt="skin1">
        <div class="item-details">
            <div class="item-name">AK-47 | Asiimov</div>
 <div class="item-price">250€</div>
        </div>
    </div>
    
    <div class="market-item">
        <img src="emka.png" alt="skin2">
        <div class="item-details">
            <div class="item-name">M4A4 | Howl</div>
            <div class="item-price">1200€</div>
        </div>
    </div>
    
    <div class="market-item">
        <img src="AWP.png" alt="skin3">
        <div class="item-details">
            <div class="item-name">AWP | Gungnir</div>
            <div class="item-price">850€</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
