<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1d29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            font-size: 16px;
        }
        h1 {
            font-style: italic;
            margin-bottom: 30px;
        }
        .market-item {
            background: #161922;
            padding: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .market-item:hover {
            background: #252a3d;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .market-item img {
            width: 100%;
            height: 140px;
            background: #444;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .item-price {
            color: #4ade80;
            font-size: 1.1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn btn-outline-light btn-sm mt-3 mb-4">← MARKET</a>
    <h1>Market</h1>

    <div class="row g-4">

        <div class="col-4">
            <div class="market-item">
                <img src="k1.jfif" alt="k1">
                <div class="item-name">AK-47 | Asiimov</div>
                <div class="item-price">250€</div>
            </div>
        </div>

        <div class="col-4">

            </div>
        </div>

        <div class="col-4">

        <div class="col-4">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
